apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: lab-services
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - service: auth-service
      - service: order-service
      - service: payment-service
      - service: frontend-service
  template:
    metadata:
      name: '{{service}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/Numberdar-Anony/platform-configs.git'
        targetRevision: HEAD
        path: 'k8s/{{service}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: devops-lab
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
